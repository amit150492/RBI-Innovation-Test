spring.application.name=Loan Application Service
# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/loan_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
# Hibernate/JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' automatically creates/updates the 'loan_applications' table in MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Server Port
server.port=8080